apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: consensusnode-networkstore
  namespace: {{ .Values.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.consensusnode.storage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.consensusnode.storage.size }}
