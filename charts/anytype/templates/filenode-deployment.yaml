apiVersion: apps/v1
kind: Deployment
metadata:
  name: any-sync-filenode
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: any-sync-filenode
  template:
    metadata:
      labels:
        app: any-sync-filenode
    spec:
      initContainers:
        - name: wait-for-coordinator
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - until nc -z any-sync-coordinator.{{ .Values.namespace }}.svc.cluster.local {{ .Values.coordinator.ports.tcp }}; do sleep 2; done
        - name: wait-for-redis
          image: {{ printf "%s:%s" .Values.redis.image.repository .Values.redis.image.tag }}
          command: ["/bin/sh", "-c"]
          args:
            - until redis-cli -h redis.{{ .Values.namespace }}.svc.cluster.local -p {{ .Values.redis.port }} ping 2>/dev/null | grep -q PONG; do sleep 2; done
      containers:
        - name: filenode
          image: {{ printf "%s:%s" .Values.filenode.image.repository .Values.filenode.image.tag }}
          ports:
            - containerPort: {{ .Values.filenode.ports.tcp }}
              protocol: TCP
            - containerPort: {{ .Values.filenode.ports.quic }}
              protocol: UDP
          resources:
            limits:
              memory: {{ .Values.daemonMemoryLimit }}
          volumeMounts:
            - name: filenode-config
              mountPath: /etc/any-sync-filenode
            - name: aws-credentials
              mountPath: /root/.aws
              readOnly: true
            - name: networkstore
              mountPath: /networkStore
      volumes:
        - name: filenode-config
          secret:
            secretName: anytype-filenode-config
        - name: aws-credentials
          secret:
            secretName: anytype-aws-credentials
        - name: networkstore
          persistentVolumeClaim:
            claimName: filenode-networkstore
