{{- if .Values.backup }}
{{ fail "pgsql-cnpg: the 'backup' key is no longer supported. Migrate to 'objectStore' + 'retentionPolicy'. See chart v1.3.0 release notes." }}
{{- end }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ printf "%s-%s" .Values.name "cnpg" }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  instances: {{ .Values.instances }}
  {{- if .Values.imageName }}
  imageName: {{ .Values.imageName }}
  {{- end }}
  primaryUpdateStrategy: unsupervised
  storage:
    size: {{ .Values.storage.size }}
  {{- with .Values.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  postgresql:
    parameters:
      pgaudit.log: "all, -misc"
      pgaudit.log_catalog: "off"
      pgaudit.log_parameter: "on"
      pgaudit.log_relation: "on"
  {{- with .Values.bootstrap }}
  bootstrap:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.externalClusters }}
  externalClusters:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  affinity:
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
  monitoring:
    enablePodMonitor: {{ .Values.monitoring.enablePodMonitor }}
  {{- if .Values.objectStore }}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: {{ printf "%s-objectstore" .Values.name }}
  {{- end }}
{{- if .Values.objectStore }}
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: {{ printf "%s-objectstore" .Values.name }}
spec:
  configuration:
    barmanObjectStore:
      {{- toYaml .Values.objectStore | nindent 6 }}
  {{- if .Values.retentionPolicy }}
  retentionPolicy: {{ .Values.retentionPolicy }}
  {{- end }}
{{- end }}
{{ range $k, $v := .Values.scheduledBackups }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ $v.name }}
spec:
  cluster:
    name: {{ printf "%s-%s" $.Values.name "cnpg" }}
  {{- if $.Values.objectStore }}
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  {{- end }}
  {{- with $v.spec }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{ end }}
