{{- if not .Values.pvc.existingClaim }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "volsync.name" $ }}
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .Values.syncWave }}"
spec:
  accessModes:
    - {{ .Values.pvc.accessMode }}
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: {{ include "volsync.bootstrap" $ }}
  resources:
    requests:
      storage: {{ .Values.pvc.capacity }}
  storageClassName: {{ .Values.pvc.storageClass }}
{{- end }}
