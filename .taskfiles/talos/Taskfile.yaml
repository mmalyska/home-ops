---
version: "3"

vars:
  N: '{{ .N | default "mc1" }}'
  NODE_LIST:
    sh: yq '.nodes[].name' < {{.TALOS_DIR}}/nodes.yaml | tr '\n' ',' | sed 's/,$//'
  CP_LIST:
    sh: yq '.nodes[] | select(.type == "controlplane") | .name' < {{.TALOS_DIR}}/nodes.yaml | tr '\n' ',' | sed 's/,$//'
  WORKER_LIST:
    sh: yq '.nodes[] | select(.type == "worker") | .name' < {{.TALOS_DIR}}/nodes.yaml | tr '\n' ',' | sed 's/,$//'
  # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
  TALOS_VERSION: "v1.13.5"
  # renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
  KUBERNETES_VERSION: "v1.35.6"
  TALOS_CONTROLLER:
    sh: talosctl config info --output json | jq --raw-output '.endpoints[]' | shuf -n 1

tasks:
  init:
    desc: Init talosctl and grab kubeconfig (task talos:init)
    cmds:
      - task: install
      - task: generate
      - task: generate-kubeconfig

  install:
    desc: Install talosctl (task talos:install)
    cmds:
      - task: install:talos

  install:talos:
    internal: true
    desc: Install talosctl
    cmds:
      - sudo rm -f /usr/local/bin/talosctl
      - curl -sL https://talos.dev/install | sed "s+siderolabs/talos/releases/latest/download+siderolabs/talos/releases/download/{{ .TALOS_VERSION }}+g" | bash
    generates:
      - /usr/local/bin/talosctl
    status:
      - talosctl version --client --short | grep -q 'Talos {{ .TALOS_VERSION }}'

  version:
    desc: Show Talos version on all nodes (task talos:version)
    cmds:
      - talosctl --talosconfig={{.TALOS_DIR}}/clusterconfig/talosconfig version --short

  dashboard:
    desc: Show talos dashboard for N node (task talos:dashboard N=mc1)
    vars:
      NODE:
        sh: yq '.nodes[] | select(.name == "{{ .N }}") | .ip' < {{.TALOS_DIR}}/nodes.yaml
    cmds:
      - task: generate
      - talosctl --talosconfig={{.TALOS_DIR}}/clusterconfig/talosconfig --nodes {{ .NODE }} dashboard

  shutdown:
    desc: Shutdown talos N node (task talos:shutdown N=mc1)
    vars:
      NODE:
        sh: yq '.nodes[] | select(.name == "{{ .N }}") | .ip' < {{.TALOS_DIR}}/nodes.yaml
    cmds:
      - task: generate
      - task: wait_for_health
        vars: {TIMEOUT: 10m}
      - talosctl --talosconfig={{.TALOS_DIR}}/clusterconfig/talosconfig --nodes {{ .NODE }} shutdown --wait

  upgrade:k8s:
    desc: Upgrade Kubernetes to {{ .KUBERNETES_VERSION }} (task talos:upgrade:k8s N=mc1)
    vars:
      NODE:
        sh: yq '.nodes[] | select(.name == "{{ .N }}") | .ip' < {{.TALOS_DIR}}/nodes.yaml
    cmds:
      - task: init
      - talosctl --nodes {{ .NODE }} upgrade-k8s --to {{ .KUBERNETES_VERSION }}

  upgrade:all:
    desc: Upgrade all nodes to Talos version {{ .TALOS_VERSION }} (task talos:upgrade:all)
    cmds:
      - task: init
      - for:
          var: NODE_LIST
          split: ","
        task: upgrade
        vars:
          N: "{{.ITEM}}"
      - task: wait_for_health
        vars: {TIMEOUT: 10m}

  apply:restart:
    desc: Apply Talos config to a specific node with reboot (task talos:apply:restart N=mc1)
    dir: provision/talos
    vars:
      NODE:
        sh: yq '.nodes[] | select(.name == "{{ .N }}") | .ip' < {{.TALOS_DIR}}/nodes.yaml
    cmds:
      - task: generate
      - task: wait_for_health
        vars: {TIMEOUT: 10m}
      - task: apply-config
        vars: {CLI_ARGS: "-m staged"}
      - talosctl reboot --nodes {{ .NODE }} --wait
      - talosctl --nodes {{.NODE}} health --wait-timeout=10m --server=false

  apply:
    desc: Apply Talos config to a specific node without reboot (task talos:apply N=mc1)
    dir: provision/talos
    vars:
      NODE:
        sh: yq '.nodes[] | select(.name == "{{ .N }}") | .ip' < {{.TALOS_DIR}}/nodes.yaml
    cmds:
      - task: generate
      - task: wait_for_health
        vars: {TIMEOUT: 10m}
      - task: apply-config
        vars: {CLI_ARGS: "-m auto"}
      - talosctl --nodes {{.NODE}} health --wait-timeout=10m --server=false

  apply:reinstall:
    desc: Apply Talos config to a specific node and reinstall (task talos:apply:reinstall N=mc1)
    cmds:
      - task: generate
      - task: upgrade

  generate-kubeconfig:
    internal: true
    desc: Generate Talos kubeconfig (task talos:generate-kubeconfig)
    dir: provision/talos
    vars:
      NODE:
        sh: yq '.nodes[] | select(.name == "{{ .N }}") | .ip' < {{.TALOS_DIR}}/nodes.yaml
    cmds:
      - cmd: talosctl --talosconfig={{.TALOS_DIR}}/clusterconfig/talosconfig kubeconfig -f --nodes {{ .NODE }} $KUBECONFIG
    status:
      - test -f $KUBECONFIG

  generate:
    desc: Generate Talos machine configurations (task talos:generate)
    dir: provision/talos
    env:
      TALOS_VERSION: "{{.TALOS_VERSION}}"
      KUBERNETES_VERSION: "{{.KUBERNETES_VERSION}}"
    cmds:
      - task: generate:talosconfig
      - for:
          var: CP_LIST
          split: ","
        cmd: |
          envsubst < templates/controlplane.yaml > /tmp/talos-base.yaml
          talosctl machineconfig patch /tmp/talos-base.yaml \
            --patch @nodes/{{.ITEM}}.yaml \
            -o /tmp/talos-patched.yaml
          envsubst < templates/extension-nut-client.yaml >> /tmp/talos-patched.yaml
          cat templates/ethernet-rings.yaml >> /tmp/talos-patched.yaml
          mv /tmp/talos-patched.yaml clusterconfig/home-{{.ITEM}}.yaml
      - for:
          var: WORKER_LIST
          split: ","
        cmd: |
          envsubst < templates/worker.yaml > /tmp/talos-base.yaml
          talosctl machineconfig patch /tmp/talos-base.yaml \
            --patch @nodes/{{.ITEM}}.yaml \
            -o /tmp/talos-patched.yaml
          envsubst < templates/extension-nut-client.yaml >> /tmp/talos-patched.yaml
          mv /tmp/talos-patched.yaml clusterconfig/home-{{.ITEM}}.yaml
      - rm -f /tmp/talos-base.yaml
    preconditions:
      - which envsubst
      - which talosctl
      - test -n "$TALHELPER_OSCERT"

  generate:talosconfig:
    desc: Generate talosconfig from cluster secrets
    dir: provision/talos
    env:
      TALOS_VERSION: "{{.TALOS_VERSION}}"
    cmds:
      - envsubst < templates/talosctl-secrets.yaml > /tmp/talos-secrets.yaml
      - >
        talosctl gen config home https://${TALHELPER_CLUSTERDOMAIN}:6443
        --with-secrets /tmp/talos-secrets.yaml
        --output-types talosconfig
        --force
        -o clusterconfig/talosconfig
      - rm -f /tmp/talos-secrets.yaml
      - >
        talosctl --talosconfig=clusterconfig/talosconfig config endpoint
        $(yq '.nodes[] | select(.type == "controlplane") | .ip' < nodes.yaml | tr '\n' ' ')
      - >
        talosctl --talosconfig=clusterconfig/talosconfig config node
        $(yq '.nodes[].ip' < nodes.yaml | tr '\n' ' ')

  apply-config:
    internal: true
    desc: Apply Talos config to a specific node (task talos:apply N=mc1)
    dir: provision/talos
    vars:
      NODE:
        sh: yq '.nodes[] | select(.name == "{{ .N }}") | .ip' < {{.TALOS_DIR}}/nodes.yaml
      FILE:
        sh: ls {{.TALOS_DIR}}/clusterconfig/home-{{ .N }}.yaml
    cmds:
      - talosctl apply-config --nodes {{ .NODE }} --file {{.FILE}} {{ .CLI_ARGS }}
    preconditions:
      - test -f {{.TALOS_DIR}}/nodes.yaml

  upgrade:
    internal: true
    desc: Upgrade a single node to Talos version {{ .TALOS_VERSION }} (task talos:upgrade N=mc1)
    vars:
      NODE:
        sh: yq '.nodes[] | select(.name == "{{ .N }}") | .ip' < {{.TALOS_DIR}}/nodes.yaml
      FILE:
        sh: ls {{.TALOS_DIR}}/clusterconfig/home-{{ .N }}.yaml
      TALOS_IMAGE:
        sh: yq ea '[.machine.install.image].[0]' < "{{.FILE}}"
      FORCE: "{{ .FORCE | default false }}"
    status:
      - $([ "{{ .FORCE }}" = "false" ] && talosctl version --nodes {{ .NODE }} --short | grep -q 'Tag.*{{ .TALOS_VERSION }}' || return 1)
    cmds:
      - task: wait_for_health
        vars: {TIMEOUT: 10m}
      - talosctl upgrade --nodes {{ .NODE }} --image {{ .TALOS_IMAGE }} --wait=false
      - talosctl --nodes {{.NODE}} health --wait-timeout=10m --server=false

  wait_for_health:
    internal: true
    desc: Wait for services in cluster to be healthy
    cmds:
      - kubectl wait --timeout=5m --for=condition=Complete jobs --all --all-namespaces
      - kubectl -n rook-ceph wait --for jsonpath='{.status.ceph.health}'='HEALTH_OK' --timeout {{ .TIMEOUT | default "30s" }} cephcluster rook-ceph
      - kubectl -n identity wait --for jsonpath='{.status.readyInstances}'='2' --timeout {{ .TIMEOUT | default "30s" }} cluster keycloakdb-cnpg
