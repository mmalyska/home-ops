---
version: "3"

vars:
  BOOTSTRAP_RESOURCES_DIR: "{{.ROOT_DIR}}/.taskfiles/bootstrap/resources"

tasks:

  kubernetes:
    desc: Bootstrap a Talos Kubernetes cluster backed by ArgoCD and Rook
    prompt: Bootstrap a Talos Kubernetes cluster ... continue?
    cmds:
      - task: etcd
      - task: kubeconfig
      - task: apps
      - task: eso-bootstrap
      - task: rook
      - task: argocd
    preconditions:
      - talosctl config info >/dev/null 2>&1
      - test -f {{.TALOS_DIR}}/clusterconfig/talosconfig

  etcd:
    internal: true
    cmd: until talosctl --nodes {{.TALOS_CONTROLLER}} bootstrap; do sleep 10; done

  kubeconfig:
    internal: true
    cmd: talosctl kubeconfig --nodes {{.TALOS_CONTROLLER}} --force $KUBECONFIG

  apps:
    internal: true
    cmds:
      - until kubectl wait --for=condition=Ready=False nodes --all --timeout=10m; do sleep 10; done
      - helmfile --quiet --file {{.TALOS_DIR}}/apps/helmfile.yaml apply --skip-diff-on-install --suppress-diff
      - until kubectl wait --for=condition=Ready nodes --all --timeout=10m; do sleep 10; done
    env:
      KUBERNETES_DIR: '{{.KUBERNETES_DIR}}'
    preconditions:
      - test -f {{.TALOS_DIR}}/apps/helmfile.yaml

  eso-bootstrap:
    internal: true
    cmds:
      # Create external-secrets namespace idempotently
      - kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      # Inject Bitwarden machine account token so ESO ClusterSecretStore can authenticate.
      # Uses BWS_TOKEN from .envrc. Applied idempotently - re-running bootstrap is safe.
      - >-
        kubectl -n external-secrets create secret generic bitwarden-access-token
        --from-literal=bw-token=$BWS_TOKEN
        --dry-run=client -o yaml | kubectl apply -f -
    preconditions:
      - sh: test -n "$BWS_TOKEN"
        msg: BWS_TOKEN env var must be set (check .envrc)

  rook:
    internal: true
    cmds:
      - for: { var: nodes }
        task: rook-data
        vars:
          node: '{{.ITEM}}'
      - for: { var: mc1 }
        task: rook-disk
        vars:
          node: mc1
      - for: { var: mc2 }
        task: rook-disk
        vars:
          node: mc2
      - for: { var: mc3 }
        task: rook-disk
        vars:
          node: mc3
    vars:
      nodes: mc1 mc2 mc3

  rook-data:
    internal: true
    cmds:
      - envsubst < <(cat {{.BOOTSTRAP_RESOURCES_DIR}}/rook-data-job.tmpl.yaml) | kubectl apply -f -
      - bash {{.BOOTSTRAP_RESOURCES_DIR}}/wait-for-job.sh {{.job}} default
      - kubectl --namespace default wait job/{{.job}} --for condition=complete --timeout=1m
      - kubectl --namespace default logs job/{{.job}}
      - kubectl --namespace default delete job {{.job}}
    env:
      job: '{{.job}}'
      node: '{{.node}}'
    vars:
      job: wipe-data-{{.node}}
    preconditions:
      - test -f {{.BOOTSTRAP_RESOURCES_DIR}}/wait-for-job.sh
      - test -f {{.BOOTSTRAP_RESOURCES_DIR}}/rook-data-job.tmpl.yaml

  rook-disk:
    internal: true
    cmds:
      - envsubst < <(cat {{.BOOTSTRAP_RESOURCES_DIR}}/rook-disk-job.tmpl.yaml) | kubectl apply -f -
      - bash {{.BOOTSTRAP_RESOURCES_DIR}}/wait-for-job.sh {{.job}} default
      - kubectl --namespace default wait job/{{.job}} --for condition=complete --timeout=1m
      - kubectl --namespace default logs job/{{.job}}
      - kubectl --namespace default delete job {{.job}}
    env:
      job: '{{.job}}'
      node: '{{.node}}'
    vars:
      job: wipe-disk-{{.node}}-{{.serial | lower}}
    preconditions:
      - test -f {{.BOOTSTRAP_RESOURCES_DIR}}/wait-for-job.sh
      - test -f {{.BOOTSTRAP_RESOURCES_DIR}}/rook-disk-job.tmpl.yaml

  argocd:
    internal: true
    cmds:
      # Create argocd namespace explicitly so we can pre-create the cluster-secrets
      # placeholder before applying the kustomize (which contains a volume mount for it).
      - kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      # Create an empty cluster-secrets K8s Secret so the ArgoCD repo-server CMP sidecar
      # can mount it and start. ESO will populate it with real Bitwarden values once deployed.
      - kubectl -n argocd create secret generic cluster-secrets --dry-run=client -o yaml | kubectl apply -f -
      # Apply all ArgoCD manifests: operator, CMP plugins, repo-server patches, and
      # ExternalSecrets for ArgoCD's own credentials (OIDC, private repo, cluster-secrets).
      - kubectl apply --server-side --kustomize {{.CLUSTER_DIR}}/apps/core/argocd
      # Apply the root app-of-apps that drives the full GitOps stack via ApplicationSets.
      - kubectl -n argocd apply -f {{.CLUSTER_DIR}}/bootstrap-application.yaml
      # Wait for ArgoCD server to become available before returning.
      - kubectl -n argocd wait --for=condition=Available deployment/argocd-server --timeout=5m
    preconditions:
      - test -f {{.CLUSTER_DIR}}/apps/core/argocd/kustomization.yaml
      - test -f {{.CLUSTER_DIR}}/bootstrap-application.yaml

  rook-sync:
    desc: Sync Rook Ceph operator then cluster via ArgoCD (run after bootstrap completes)
    cmds:
      - argocd app sync rook-ceph-operator --timeout 300
      - kubectl -n rook-ceph wait --for=condition=Available deployment/rook-ceph-operator --timeout=5m
      - argocd app sync rook-ceph-cluster --timeout 300
    preconditions:
      - sh: argocd app list >/dev/null 2>&1
        msg: ArgoCD must be accessible (run 'task argocd:login' first)
