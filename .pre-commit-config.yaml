---
fail_fast: false
exclude: |
  (?x)^(
      docs/_assets/.*
    | .*\.sops\.toml
    | .*\.patch
  )$
repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - args:
          - --config-file
          - .github/linters/.yamllint.yaml
        id: yamllint
  - repo: local
    hooks:
      - id: helmlint
        name: helm lint
        language: system
        entry: bash -c 'for chart in "$@"; do dir=$(dirname "$chart"); helm dependency update "$dir" --quiet 2>/dev/null || true; helm lint "$dir"; done' --
        files: Chart\.yaml$
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: fix-byte-order-marker
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: remove-crlf
      - id: remove-tabs
  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-smartquotes
  - repo: local
    hooks:
      - id: prettier
        name: prettier (yaml)
        language: system
        entry: prettier --write --config .github/linters/.prettierrc.yaml
        types: [yaml]
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix
        args: [--config, .github/linters/.markdownlint.yaml]
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
