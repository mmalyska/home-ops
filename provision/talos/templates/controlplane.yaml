version: v1alpha1
debug: false
persist: true
machine:
  type: controlplane
  token: ${TALHELPER_TRUSTDTOKEN}
  ca:
    crt: ${TALHELPER_OSCERT}
    key: ${TALHELPER_OSKEY}
  certSANs:
    - ${TALHELPER_CLUSTERENDPOINTIP}
    - ${TALHELPER_CLUSTERDOMAIN}
    - 127.0.0.1
  kubelet:
    image: ghcr.io/siderolabs/kubelet:${KUBERNETES_VERSION}
    extraArgs:
      rotate-server-certificates: "true"
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
  network:
    nameservers:
      - 192.168.50.9
  install:
    disk: /dev/nvme0n1
    image: factory.talos.dev/metal-installer/a586a5113bc834fd711beb77c98fb6f407c824fa3ab2f1cdf2940840b6e807f0:${TALOS_VERSION}
    wipe: false
    grubUseUKICmdline: true
  files:
    - content: |
        [plugins]
          [plugins."io.containerd.grpc.v1.cri"]
            enable_unprivileged_ports = true
            enable_unprivileged_icmp = true
        [plugins."io.containerd.grpc.v1.cri".containerd]
          discard_unpacked_layers = false
        [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
          discard_unpacked_layers = false
      permissions: 0o0
      path: /etc/cri/conf.d/20-customization.part
      op: create
  time:
    disabled: false
    servers:
      - 192.168.50.1
  sysctls:
    fs.inotify.max_user_instances: "8192"
    fs.inotify.max_user_watches: "1048576"
    net.core.rmem_max: "67108864"
    net.core.wmem_max: "67108864"
    vm.nr_hugepages: "1024"
  features:
    kubernetesTalosAPIAccess:
      enabled: true
      allowedRoles:
        - os:etcd:backup
      allowedKubernetesNamespaces:
        - talos-backup
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: false
      resolveMemberNames: true
  udev:
    rules:
      - SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="44", MODE="0660"
  nodeLabels:
    topology.kubernetes.io/region: home
    topology.kubernetes.io/zone: m
    daytona-sandbox-c: "true"
cluster:
  id: ${TALHELPER_CLUSTERNAME}
  secret: ${TALHELPER_CLUSTERSECRET}
  controlPlane:
    endpoint: https://${TALHELPER_CLUSTERDOMAIN}:6443
  clusterName: home
  network:
    cni:
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: ${TALHELPER_BOOTSTRAPTOKEN}
  secretboxEncryptionSecret: ${TALHELPER_AESCBCENCYPTIONKEY}
  ca:
    crt: ${TALHELPER_K8SCERT}
    key: ${TALHELPER_K8SKEY}
  aggregatorCA:
    crt: ${TALHELPER_K8SAGGCERT}
    key: ${TALHELPER_K8SAGGKEY}
  serviceAccount:
    key: ${TALHELPER_K8SSAKEY}
  apiServer:
    image: registry.k8s.io/kube-apiserver:${KUBERNETES_VERSION}
    extraArgs:
      oidc-client-id: ${TALHELPER_OIDCCLIENTID}
      oidc-groups-claim: groups
      oidc-groups-prefix: "oidc:"
      oidc-issuer-url: ${TALHELPER_OIDCISSUERURL}
      oidc-username-claim: email
      oidc-username-prefix: "oidc:"
    certSANs:
      - ${TALHELPER_CLUSTERENDPOINTIP}
      - ${TALHELPER_CLUSTERDOMAIN}
      - 127.0.0.1
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          defaults:
            audit: restricted
            audit-version: latest
            enforce: baseline
            enforce-version: latest
            warn: restricted
            warn-version: latest
          exemptions:
            namespaces:
              - kube-system
            runtimeClasses: []
            usernames: []
          kind: PodSecurityConfiguration
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
  controllerManager:
    image: registry.k8s.io/kube-controller-manager:${KUBERNETES_VERSION}
    extraArgs:
      bind-address: 0.0.0.0
  proxy:
    disabled: true
    image: registry.k8s.io/kube-proxy:${KUBERNETES_VERSION}
    extraArgs:
      bind-address: 0.0.0.0
  scheduler:
    image: registry.k8s.io/kube-scheduler:${KUBERNETES_VERSION}
    extraArgs:
      bind-address: 0.0.0.0
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true
      service: {}
  etcd:
    ca:
      crt: ${TALHELPER_ETCDCERT}
      key: ${TALHELPER_ETCDKEY}
  coreDNS:
    disabled: true
  allowSchedulingOnMasters: true
