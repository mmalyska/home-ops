app-template:
  controllers:
    whisper:
      strategy: Recreate
      containers:
        pl:
          image:
            repository: rhasspy/wyoming-whisper
            tag: 3.3.1@sha256:258956d1508a042ae52ceca04da85f6e74e7fab81676e3678619b8047e88c721
            pullPolicy: IfNotPresent
          args:
            - --language
            - pl
            - --model
            - base-int8
            - --data-dir
            - /data
          env:
            HF_HUB_CACHE: "/model-cache"
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi
          probes:
            liveness:
              enabled: true
            readiness:
              enabled: true
            startup:
              enabled: true
              spec:
                initialDelaySeconds: 0
                periodSeconds: 10
                timeoutSeconds: 1
                failureThreshold: 30

  service:
    pl:
      annotations:
        lbipam.cilium.io/sharing-key: "voice-pipeline"
        lbipam.cilium.io/sharing-cross-namespace: "*"
        lbipam.cilium.io/ips: "192.168.48.27"
      type: LoadBalancer
      controller: whisper
      ports:
        tcp:
          port: 10300
  persistence:
    data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
    model-cache:
      type: emptyDir
