app-template:
  controllers:
    whisper:
      strategy: Recreate
      containers:
        pl:
          image:
            repository: rhasspy/wyoming-whisper
            tag: 3.2.0@sha256:966e1b0967f398b81fa2273a96b2b940004fa1b77754f9ffda6b5689a58dd158
            pullPolicy: IfNotPresent
          args:
            - --language
            - pl
            - --model
            - base-int8
            - --data-dir
            - /data
          env:
            HF_HUB_CACHE: "/model-cache"
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi
          probes:
            liveness:
              enabled: true
            readiness:
              enabled: true
            startup:
              enabled: true
              spec:
                initialDelaySeconds: 0
                periodSeconds: 10
                timeoutSeconds: 1
                failureThreshold: 30

  service:
    pl:
      annotations:
        lbipam.cilium.io/sharing-key: "voice-pipeline"
        lbipam.cilium.io/sharing-cross-namespace: "*"
        lbipam.cilium.io/ips: "192.168.48.27"
      type: LoadBalancer
      controller: whisper
      ports:
        tcp:
          port: 10300
  persistence:
    data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
    model-cache:
      type: emptyDir
