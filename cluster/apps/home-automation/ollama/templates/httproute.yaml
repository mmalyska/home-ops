apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama
  annotations:
    external-dns.alpha.kubernetes.io/controller: internal
spec:
  parentRefs:
    - name: envoy-internal
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - ollama.<secret:private-domain>
  rules:
    - backendRefs:
        - name: ollama
          port: 11434
