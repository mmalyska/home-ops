persistance:
  storageClassName: ceph-block
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
minecraft-bedrock:
  image:
    repository: itzg/minecraft-bedrock-server
    tag: 2026.6.1@sha256:35e2cc7de2009b247c850d7c88415b2bc7d1559a690232927a447031d3b381c1
    pullPolicy: IfNotPresent
  persistence:
    dataDir:
      enabled: true
      existingClaim: minecraft-bedrock-datadir
      Size: 10Gi
  resources:
    requests:
      memory: 250Mi
      cpu: 200m
    limits:
      memory: 2Gi
  minecraftServer:
    eula: "TRUE"
    version: 1.21.111.1
    difficulty: normal
    gameMode: survival
    levelName: jaskinia
    serverName: "Jaskinia"
    cheats: false
    serviceType: LoadBalancer
    loadBalancerIP: 192.168.48.23
    ops: <secret:ops>
    defaultPermission: visitor
    whitelistUsers: <secret:whitelistUsers>
