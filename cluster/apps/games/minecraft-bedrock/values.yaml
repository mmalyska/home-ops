persistance:
  storageClassName: ceph-block
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
minecraft-bedrock:
  image:
    repository: itzg/minecraft-bedrock-server
    tag: 2026.6.2@sha256:8e045b7b3a4d43ad70459356874a262fd63e2f2ce82d5b0c9e5e956233e9d771
    pullPolicy: IfNotPresent
  persistence:
    dataDir:
      enabled: true
      existingClaim: minecraft-bedrock-datadir
      Size: 10Gi
  resources:
    requests:
      memory: 250Mi
      cpu: 200m
    limits:
      memory: 2Gi
  minecraftServer:
    eula: "TRUE"
    version: 1.21.111.1
    difficulty: normal
    gameMode: survival
    levelName: jaskinia
    serverName: "Jaskinia"
    cheats: false
    serviceType: LoadBalancer
    loadBalancerIP: 192.168.48.23
    ops: <secret:ops>
    defaultPermission: visitor
    whitelistUsers: <secret:whitelistUsers>
