- enabled: "true"
  namespace: minecraft-bedrock
  syncPolicy:
    enabled: true
    selfHeal: false
    prune: false
  plugin:
    env:
      - name: SECRET_PROVIDER
        value: cluster-secrets
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: minecraft-bedrock-minecraft-bedrock
      jsonPointers:
        - /spec/replicas
