---
apiVersion: batch/v1
kind: Job
metadata:
  name: wow-db-import
  namespace: wow
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "3"
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.4@sha256:d36d39a64cd12a5c1cc9e6aa2bfb5f8d4c81a2f6586e0a04a9ae13939db02209
          command:
            - sh
            - -c
            - |
              until mysqladmin ping -h mysql -u root -p$MYSQL_ROOT_PASSWORD --silent; do
                echo "waiting for mysql..."; sleep 5
              done
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wow-mysql-secret
                  key: MYSQL_ROOT_PASSWORD
      containers:
        - name: db-import
          image: ghcr.io/mmalyska/azerothcore-db-import:rolling@sha256:02535dca60c5de88aa6897c53ed6fc4e17b40b4a6038f62146eb35d7449c7b18
          env:
            - name: AC_DATA_DIR
              value: /azerothcore/env/dist/data
            - name: AC_LOGS_DIR
              value: /azerothcore/env/dist/logs
            - name: AC_LOGIN_DATABASE_INFO
              valueFrom:
                secretKeyRef:
                  name: wow-mysql-secret
                  key: AC_LOGIN_DATABASE_INFO_ROOT
            - name: AC_WORLD_DATABASE_INFO
              valueFrom:
                secretKeyRef:
                  name: wow-mysql-secret
                  key: AC_WORLD_DATABASE_INFO_ROOT
            - name: AC_CHARACTER_DATABASE_INFO
              valueFrom:
                secretKeyRef:
                  name: wow-mysql-secret
                  key: AC_CHARACTER_DATABASE_INFO_ROOT
            - name: AC_REALM_ADDRESS
              value: {{.Values.realmAddress | quote}}
