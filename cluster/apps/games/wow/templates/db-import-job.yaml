---
apiVersion: batch/v1
kind: Job
metadata:
  name: wow-db-import
  namespace: wow
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "3"
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.4@sha256:6e54d72c66fb55fa2bba384cba8c7c0ea9d629fb4d2af613b0eef98d19c6df15
          command:
            - sh
            - -c
            - |
              until mysqladmin ping -h mysql -u root -p$MYSQL_ROOT_PASSWORD --silent; do
                echo "waiting for mysql..."; sleep 5
              done
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wow-mysql-secret
                  key: MYSQL_ROOT_PASSWORD
      containers:
        - name: db-import
          image: ghcr.io/mmalyska/azerothcore-db-import:rolling@sha256:06ffd306c60c2457cf8f9059b602767ceb0b00f12e67af349a47585bbde84773
          env:
            - name: AC_DATA_DIR
              value: /azerothcore/env/dist/data
            - name: AC_LOGS_DIR
              value: /azerothcore/env/dist/logs
            - name: AC_LOGIN_DATABASE_INFO
              valueFrom:
                secretKeyRef:
                  name: wow-mysql-secret
                  key: AC_LOGIN_DATABASE_INFO_ROOT
            - name: AC_WORLD_DATABASE_INFO
              valueFrom:
                secretKeyRef:
                  name: wow-mysql-secret
                  key: AC_WORLD_DATABASE_INFO_ROOT
            - name: AC_CHARACTER_DATABASE_INFO
              valueFrom:
                secretKeyRef:
                  name: wow-mysql-secret
                  key: AC_CHARACTER_DATABASE_INFO_ROOT
