---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wow-hooks
  namespace: wow
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wow-hooks
  namespace: wow
subjects:
  - kind: ServiceAccount
    name: default
    namespace: wow
roleRef:
  kind: Role
  name: wow-hooks
  apiGroup: rbac.authorization.k8s.io
