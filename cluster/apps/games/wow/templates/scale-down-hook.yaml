---
apiVersion: batch/v1
kind: Job
metadata:
  name: wow-scale-down
  namespace: wow
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: default
      containers:
        - name: scale-down
          image: registry.k8s.io/kubectl:v1.34.7@sha256:e77b87f5471e9f2c3f0c4a55bb9279e9ccd1734f7814b766b7ac099fd3ae9bfa
          command:
            - sh
            - -c
            - |
              kubectl scale deployment wow-worldserver wow-authserver --replicas=0 -n wow || true
              kubectl rollout status deployment/wow-worldserver -n wow --timeout=120s || true
              kubectl rollout status deployment/wow-authserver -n wow --timeout=120s || true
