---
apiVersion: batch/v1
kind: Job
metadata:
  name: wow-scale-down
  namespace: wow
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: default
      containers:
        - name: scale-down
          image: docker.io/alpine/k8s:1.36.1@sha256:692239d739589247c4a791205ed9619c28ae85a21286e19a6211c04a62c56668
          command:
            - sh
            - -c
            - |
              kubectl scale deployment wow-worldserver wow-authserver --replicas=0 -n wow || true
              kubectl rollout status deployment/wow-worldserver -n wow --timeout=120s || true
              kubectl rollout status deployment/wow-authserver -n wow --timeout=120s || true
