---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wow-restic
  namespace: wow
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: wow-restic-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: "{{`{{ .REPOSITORY_TEMPLATE }}`}}/wow-mysql"
        RESTIC_PASSWORD: "{{`{{ .RESTIC_PASSWORD }}`}}"
        AWS_ACCESS_KEY_ID: "{{`{{ .AWS_ACCESS_KEY_ID }}`}}"
        AWS_SECRET_ACCESS_KEY: "{{`{{ .AWS_SECRET_ACCESS_KEY }}`}}"
  data:
    - secretKey: REPOSITORY_TEMPLATE
      remoteRef:
        key: "39b92426-09c4-4a74-8285-b40a00d62b4d" #gitleaks:allow #VOLSYNC_RESTIC_REPOSITORY_TEMPLATE
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: "07d70a7a-a6d9-4b0b-af1f-b40a00d649a9" #gitleaks:allow #VOLSYNC_RESTIC_PASSWORD
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: "adb66319-d083-4379-afd5-b40a00d66963" #gitleaks:allow #VOLSYNC_RESTIC_AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: "70ebd8f2-8270-46d8-8953-b40a00d6854f" #gitleaks:allow #VOLSYNC_RESTIC_AWS_SECRET_ACCESS_KEY
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: wow
spec:
  schedule: "0 */12 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: dump
              emptyDir: {}
          initContainers:
            - name: dump
              image: mysql:8.4@sha256:d36d39a64cd12a5c1cc9e6aa2bfb5f8d4c81a2f6586e0a04a9ae13939db02209
              command:
                - sh
                - -c
                - |
                  for db in acore_auth acore_characters acore_world; do
                    echo "Dumping $db..."
                    mysqldump --single-transaction \
                      -h mysql -u root -p"${MYSQL_ROOT_PASSWORD}" \
                      "$db" | gzip > /dump/"${db}".sql.gz
                  done
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: wow-mysql-secret
                      key: MYSQL_ROOT_PASSWORD
              volumeMounts:
                - name: dump
                  mountPath: /dump
          containers:
            - name: restic
              image: restic/restic:0.19.0@sha256:7f44e0057b82348597568ea209360762d0b38f8e1dbc8ad859661ac1055e45f2
              command:
                - sh
                - -c
                - |
                  restic cat config > /dev/null 2>&1 || restic init
                  restic unlock
                  restic backup /dump
                  restic forget --prune \
                    --keep-daily 6 \
                    --keep-weekly 4 \
                    --keep-monthly 2
              envFrom:
                - secretRef:
                    name: wow-restic-secret
              volumeMounts:
                - name: dump
                  mountPath: /dump
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
