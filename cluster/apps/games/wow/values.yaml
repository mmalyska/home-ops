# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/refs/tags/app-template-3.6.1/charts/other/app-template/values.schema.json
---
realmAddress: &realmAddress "192.168.48.29"

ahbot:
  accountId: 2
  characterGuid: 1

controllers:
  authserver:
    type: deployment
    replicas: 1
    annotations:
      argocd.argoproj.io/sync-wave: "4"
    containers:
      authserver:
        image:
          repository: ghcr.io/mmalyska/azerothcore-authserver
          tag: rolling@sha256:550f7473853391b926ab20ea377a048ad18f4f9b37a5793756f95c8eaaeefaa9
        env:
          AC_LOGS_DIR: /azerothcore/env/dist/logs
          AC_LOGIN_DATABASE_INFO:
            valueFrom:
              secretKeyRef:
                name: wow-mysql-secret
                key: AC_LOGIN_DATABASE_INFO
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi

  worldserver:
    type: deployment
    replicas: 1
    annotations:
      argocd.argoproj.io/sync-wave: "4"
    initContainers:
      client-data:
        image:
          repository: acore/ac-wotlk-client-data
          tag: master@sha256:a7d8b90d4467120e0ac7c2430c89a215f9df6d6407f0f4fa26c66999fead6247
        env:
          DATAPATH: /azerothcore/env/dist/data
      patch-ahbot-config:
        image:
          repository: ghcr.io/mmalyska/azerothcore-worldserver
          tag: rolling@sha256:9d83c95ff361b0de16b7e3b8dfa3891c761264c5e3bd60ecc8fee52ccd0fc221
        command:
          - /patches/patch.sh
    containers:
      worldserver:
        tty: true
        stdin: true
        image:
          repository: ghcr.io/mmalyska/azerothcore-worldserver
          tag: rolling@sha256:9d83c95ff361b0de16b7e3b8dfa3891c761264c5e3bd60ecc8fee52ccd0fc221
        env:
          AC_DATA_DIR: /azerothcore/env/dist/data
          AC_LOGS_DIR: /azerothcore/env/dist/logs
          AC_LOGIN_DATABASE_INFO:
            valueFrom:
              secretKeyRef:
                name: wow-mysql-secret
                key: AC_LOGIN_DATABASE_INFO
          AC_WORLD_DATABASE_INFO:
            valueFrom:
              secretKeyRef:
                name: wow-mysql-secret
                key: AC_WORLD_DATABASE_INFO
          AC_CHARACTER_DATABASE_INFO:
            valueFrom:
              secretKeyRef:
                name: wow-mysql-secret
                key: AC_CHARACTER_DATABASE_INFO
          AC_SOAP_ENABLED: "1"
          AC_SOAP_IP: "0.0.0.0"
          AC_MAP_UPDATE_INTERVAL: "100"
          AC_MIN_WORLD_UPDATE_TIME: "10"
          # Single-player experience rates
          AC_RATE_XP_KILL: "3"
          AC_RATE_XP_QUEST: "3"
          AC_RATE_XP_EXPLORE: "3"
          # Drop rates by quality (Rate.Drop.Item.* in worldserver.conf)
          AC_RATE_DROP_MONEY: "2"
          AC_RATE_DROP_ITEM_NORMAL: "2"
          AC_RATE_DROP_ITEM_UNCOMMON: "2"
          AC_RATE_DROP_ITEM_RARE: "2"
          AC_RATE_DROP_ITEM_EPIC: "2"
          AC_RATE_DROP_ITEM_LEGENDARY: "2"
          AC_RATE_REPUTATION_GAIN: "2"
          AC_RATE_REST_INGAME: "2"
          # Skill gain rates (SkillGain.* in worldserver.conf)
          AC_SKILLGAIN_CRAFTING: "2"
          AC_SKILLGAIN_GATHERING: "2"
          AC_SKILLGAIN_WEAPON: "2"
          AC_SKILLGAIN_DEFENSE: "2"
          # QoL for solo play
          AC_SKIP_CINEMATICS: "1"
          AC_ALWAYS_MAX_SKILL_FOR_LEVEL: "1"
          AC_INSTANCE_IGNORE_RAID: "1"
          AC_START_PLAYER_MONEY: "100000"
          AC_RATE_PET_LEVELXP: "0.15"
          AC_DEATH_SICKNESS_LEVEL: "80"
          AC_RATE_HONOR: "2"
          AC_RATE_ARENA_POINTS: "2"
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            memory: 4Gi

  adminer:
    type: deployment
    replicas: 1
    containers:
      adminer:
        image:
          repository: adminer
          tag: latest@sha256:cc64d253db4f016cbcff2ff2f01e60ed07e74f38b4398f84d3c4fae4b5ce0e07
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi

service:
  authserver:
    controller: authserver
    annotations:
      lbipam.cilium.io/ips: *realmAddress
      lbipam.cilium.io/sharing-key: "wow"
    type: LoadBalancer
    ports:
      auth:
        protocol: TCP
        port: 3724
  worldserver:
    controller: worldserver
    annotations:
      lbipam.cilium.io/ips: *realmAddress
      lbipam.cilium.io/sharing-key: "wow"
    type: LoadBalancer
    ports:
      world:
        protocol: TCP
        port: 8085
      soap:
        protocol: TCP
        port: 7878
  adminer:
    controller: adminer
    type: ClusterIP
    ports:
      http:
        protocol: TCP
        port: 8080

persistence:
  client-data:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: wow-client-data
    advancedMounts:
      worldserver:
        client-data:
          - path: /azerothcore/env/dist/data
        worldserver:
          - path: /azerothcore/env/dist/data
            readOnly: true
  ahbot-patch:
    enabled: true
    type: configMap
    name: wow-ahbot-patch
    defaultMode: 0755
    advancedMounts:
      worldserver:
        patch-ahbot-config:
          - path: /patches
  modules-config:
    enabled: true
    type: emptyDir
    advancedMounts:
      worldserver:
        patch-ahbot-config:
          - path: /modules-config
        worldserver:
          - path: /azerothcore/env/dist/etc/modules
  logs:
    enabled: true
    type: emptyDir
    advancedMounts:
      worldserver:
        worldserver:
          - path: /azerothcore/env/dist/logs
      authserver:
        authserver:
          - path: /azerothcore/env/dist/logs
