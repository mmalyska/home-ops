# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/refs/tags/app-template-3.6.1/charts/other/app-template/values.schema.json
---
realmAddress: &realmAddress "192.168.48.29"

ahbot:
  accountId: 2
  characterGuid: 1

controllers:
  authserver:
    type: deployment
    replicas: 1
    annotations:
      argocd.argoproj.io/sync-wave: "4"
    containers:
      authserver:
        image:
          repository: ghcr.io/mmalyska/azerothcore-authserver
          tag: rolling@sha256:6d91682bf12b6a14634630f7d4fe8bc28ad62afa9e115648c31e07c065976093
        env:
          AC_LOGS_DIR: /azerothcore/env/dist/logs
          AC_LOGIN_DATABASE_INFO:
            valueFrom:
              secretKeyRef:
                name: wow-mysql-secret
                key: AC_LOGIN_DATABASE_INFO
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi

  worldserver:
    type: deployment
    replicas: 1
    annotations:
      argocd.argoproj.io/sync-wave: "4"
    initContainers:
      client-data:
        image:
          repository: acore/ac-wotlk-client-data
          tag: master@sha256:5a57099954f5cb8ce97fa5dd67941c3079a350cd2c1f9bdb9ab0f264a3339ef7
        env:
          DATAPATH: /azerothcore/env/dist/data
      patch-ahbot-config:
        image:
          repository: ghcr.io/mmalyska/azerothcore-worldserver
          tag: rolling@sha256:bbe2306a6324cff9cb9598f3e259c04412b0488f4860b74ce5730874144a92f1
        command:
          - /patches/patch.sh
    containers:
      worldserver:
        tty: true
        stdin: true
        image:
          repository: ghcr.io/mmalyska/azerothcore-worldserver
          tag: rolling@sha256:bbe2306a6324cff9cb9598f3e259c04412b0488f4860b74ce5730874144a92f1
        env:
          AC_DATA_DIR: /azerothcore/env/dist/data
          AC_LOGS_DIR: /azerothcore/env/dist/logs
          AC_LOGIN_DATABASE_INFO:
            valueFrom:
              secretKeyRef:
                name: wow-mysql-secret
                key: AC_LOGIN_DATABASE_INFO
          AC_WORLD_DATABASE_INFO:
            valueFrom:
              secretKeyRef:
                name: wow-mysql-secret
                key: AC_WORLD_DATABASE_INFO
          AC_CHARACTER_DATABASE_INFO:
            valueFrom:
              secretKeyRef:
                name: wow-mysql-secret
                key: AC_CHARACTER_DATABASE_INFO
          AC_SOAP_ENABLED: "1"
          AC_SOAP_IP: "0.0.0.0"
          AC_MAP_UPDATE_INTERVAL: "100"
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            memory: 4Gi

  adminer:
    type: deployment
    replicas: 1
    containers:
      adminer:
        image:
          repository: adminer
          tag: latest@sha256:cc64d253db4f016cbcff2ff2f01e60ed07e74f38b4398f84d3c4fae4b5ce0e07
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi

service:
  authserver:
    controller: authserver
    annotations:
      lbipam.cilium.io/ips: *realmAddress
      lbipam.cilium.io/sharing-key: "wow"
    type: LoadBalancer
    ports:
      auth:
        protocol: TCP
        port: 3724
  worldserver:
    controller: worldserver
    annotations:
      lbipam.cilium.io/ips: *realmAddress
      lbipam.cilium.io/sharing-key: "wow"
    type: LoadBalancer
    ports:
      world:
        protocol: TCP
        port: 8085
      soap:
        protocol: TCP
        port: 7878
  adminer:
    controller: adminer
    type: ClusterIP
    ports:
      http:
        protocol: TCP
        port: 8080

persistence:
  client-data:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: wow-client-data
    advancedMounts:
      worldserver:
        client-data:
          - path: /azerothcore/env/dist/data
        worldserver:
          - path: /azerothcore/env/dist/data
            readOnly: true
  ahbot-patch:
    enabled: true
    type: configMap
    name: wow-ahbot-patch
    defaultMode: 0755
    advancedMounts:
      worldserver:
        patch-ahbot-config:
          - path: /patches
  modules-config:
    enabled: true
    type: emptyDir
    advancedMounts:
      worldserver:
        patch-ahbot-config:
          - path: /modules-config
        worldserver:
          - path: /azerothcore/env/dist/etc/modules
  logs:
    enabled: true
    type: emptyDir
    advancedMounts:
      worldserver:
        worldserver:
          - path: /azerothcore/env/dist/logs
      authserver:
        authserver:
          - path: /azerothcore/env/dist/logs
