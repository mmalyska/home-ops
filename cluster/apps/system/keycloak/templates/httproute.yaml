---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "keycloak.server.fullname" . }}
  annotations:
    external-dns.alpha.kubernetes.io/controller: dns-controller
spec:
  parentRefs:
    - name: envoy-external
      namespace: envoy-gateway
      sectionName: https
    - name: envoy-internal
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - {{ .Values.server.ingress.host | quote }}
  rules:
    - backendRefs:
        - name: {{ template "keycloak.server.fullname" . }}
          port: {{ .Values.server.service.servicePortHttp }}
