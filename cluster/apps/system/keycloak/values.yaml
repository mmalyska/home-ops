global:
  additionalLabels: {}
  podAnnotations: {}
  podLabels: {}
  image:
    imagePullPolicy: IfNotPresent
server:
  name: server
  replicas: 1
  podAnnotations: {}
  podLabels: {}
  containerPort: 8080
  env:
    - name: KC_HOSTNAME
      value: "https://l.<secret:private-domain>"
    - name: KC_DB
      value: "postgres"
    - name: KC_DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: keycloakdb-cnpg-app
          key: username
    - name: KC_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: keycloakdb-cnpg-app
          key: password
    - name: KC_DB_URL_DATABASE
      value: app
    - name: KC_DB_URL_HOST
      value: keycloakdb-cnpg-rw
    - name: KC_FEATURES
      value: "docker"
    - name: KC_METRICS_ENABLED
      value: "true"
    - name: KC_HEALTH_ENABLED
      value: "true"
    - name: KC_HTTP_ENABLED
      value: "true"
    - name: KC_PROXY_HEADERS
      value: xforwarded
  envFrom: []
  image:
    imagePullPolicy: IfNotPresent
    repository: quay.io/keycloak/keycloak
    tag: "26.6.4@sha256:0aae0de7fca85525f727d3354df17896092de8bb26ae4c12d89c77e5df8cbce4"
  service:
    type: ClusterIP
    servicePortHttpName: http
    servicePortHttp: 80
    namedTargetPort: true
  ingress:
    host: l.<secret:private-domain>
  readinessProbe:
    enabled: true
    failureThreshold: 30
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  livenessProbe:
    enabled: true
    failureThreshold: 30
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  resources:
    requests:
      memory: 1300Mi
      cpu: 50m
    limits:
      memory: 2Gi
      cpu: "2"
pgsql-cnpg:
  name: keycloakdb
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6-standard-bookworm
  instances: 2
  storage:
    size: 2Gi
  resources:
    requests:
      memory: 200Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  # Uncomment to restore from S3 backup (requires at least one successful backup to exist):
  # bootstrap:
  #   recovery:
  #     source: keycloakdb-cnpg-backup
  # externalClusters:
  #   - name: keycloakdb-cnpg-backup
  #     plugin:
  #       name: barman-cloud.cloudnative-pg.io
  #       parameters:
  #         barmanObjectName: keycloakdb-objectstore
  monitoring:
    enablePodMonitor: true
  retentionPolicy: "10d"
  objectStore:
    destinationPath: "s3://k8s-at-home-backup/cnpg/keycloak"
    endpointURL: <secret:s3_endpoint>
    s3Credentials:
      accessKeyId:
        name: keycloakdb-secrets
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: keycloakdb-secrets
        key: S3_ACCESS_SECRET_KEY
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
  scheduledBackups:
    - name: keycloakdb-cnpg-backup
      spec:
        immediate: true
        schedule: "55 0 0 * * *"
        backupOwnerReference: self
