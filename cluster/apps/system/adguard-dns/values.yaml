external-dns:
  fullnameOverride: adguard-dns
  extraArgs:
    - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
    - --crd-source-kind=DNSEndpoint
    - --gateway-name=envoy-internal
    - --domain-filter=$(ADGUARD_DOMAIN_FILTER)
  triggerLoopOnEvent: true
  policy: sync
  sources: ["crd", "gateway-httproute"]
  txtPrefix: k8s.
  txtOwnerId: default
  serviceMonitor:
    enabled: true
  provider:
    name: webhook
    webhook:
      image:
        repository: ghcr.io/muhlba91/external-dns-provider-adguard
        tag: v11.0.2
      service:
        port: 8888
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 10
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 10
        timeoutSeconds: 5
      env:
        - name: ADGUARD_URL
          valueFrom:
            secretKeyRef:
              name: adguard-dns-secret
              key: ADGUARD_URL
        - name: ADGUARD_USER
          valueFrom:
            secretKeyRef:
              name: adguard-dns-secret
              key: ADGUARD_USER
        - name: ADGUARD_PASSWORD
          valueFrom:
            secretKeyRef:
              name: adguard-dns-secret
              key: ADGUARD_PASSWORD
        - name: ADGUARD_DOMAIN_FILTER
          valueFrom:
            secretKeyRef:
              name: adguard-dns-secret
              key: ADGUARD_DOMAIN_FILTER
        - name: LOG_LEVEL
          value: debug
        - name: DRY_RUN
          value: "true"
