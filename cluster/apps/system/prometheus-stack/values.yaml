kube-prometheus-stack:
  kubeControllerManager:
    enabled: true
  kubeEtcd:
    enabled: true
  kubeProxy:
    enabled: false
  kubeScheduler:
    enabled: true
  grafana:
    revisionHistoryLimit: 3
    grafana.ini:
      security:
        allow_embedding: true
      auth.anonymous:
        enabled: true
        org_name: Main Org.
        org_role: Viewer
    route:
      main:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/controller: dns-controller
        parentRefs:
          - name: envoy-internal
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - grafana.<secret:private-domain>
    deploymentStrategy:
      type: Recreate
    persistence:
      enabled: true
      size: 10Gi
      accessModes: ["ReadWriteOnce"]
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: "default"
            orgId: 1
            folder: ""
            type: file
            disableDeletion: true
            editable: false
            options:
              path: /var/lib/grafana/dashboards/default
          - name: "device"
            orgId: 1
            folder: "Devices Metrics"
            type: file
            disableDeletion: true
            editable: false
            options:
              path: /var/lib/grafana/dashboards/device
          - name: "grafana-dashboards-kubernetes"
            orgId: 1
            folder: "Kubernetes"
            type: file
            disableDeletion: true
            editable: false
            options:
              path: /var/lib/grafana/dashboards/grafana-dashboards-kubernetes
          - name: "ceph"
            orgId: 1
            folder: "Ceph"
            type: file
            disableDeletion: true
            editable: false
            options:
              path: /var/lib/grafana/dashboards/ceph
    dashboardsConfigMaps:
      device: "device-dashboards"
    dashboards:
      grafana-dashboards-kubernetes:
        k8s-system-api-server:
          url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-api-server.json
          token: ""
        k8s-system-coredns:
          url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-coredns.json
          token: ""
        k8s-views-global:
          url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-global.json
          token: ""
        k8s-views-namespaces:
          url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-namespaces.json
          token: ""
        k8s-views-nodes:
          url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-nodes.json
          token: ""
        k8s-views-pods:
          url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-pods.json
          token: ""
        cncf:
          url: https://raw.githubusercontent.com/cloudnative-pg/charts/main/charts/cloudnative-pg/monitoring/grafana-dashboard.json
          token: ""
        argocd:
          url: https://raw.githubusercontent.com/argoproj/argo-cd/master/examples/dashboard.json
          token: ""
      ceph:
        ceph-cluster:
          url: https://raw.githubusercontent.com/ceph/ceph/v20.2.0/monitoring/ceph-mixin/dashboards_out/ceph-cluster.json
          token: ""
        ceph-cluster-advanced:
          url: https://raw.githubusercontent.com/ceph/ceph/v20.2.0/monitoring/ceph-mixin/dashboards_out/ceph-cluster-advanced.json
          token: ""
        ceph-hosts-overview:
          url: https://raw.githubusercontent.com/ceph/ceph/v20.2.0/monitoring/ceph-mixin/dashboards_out/hosts-overview.json
          token: ""
        ceph-host-details:
          url: https://raw.githubusercontent.com/ceph/ceph/v20.2.0/monitoring/ceph-mixin/dashboards_out/host-details.json
          token: ""
        ceph-osds-overview:
          url: https://raw.githubusercontent.com/ceph/ceph/v20.2.0/monitoring/ceph-mixin/dashboards_out/osds-overview.json
          token: ""
        ceph-osd-device-details:
          url: https://raw.githubusercontent.com/ceph/ceph/v20.2.0/monitoring/ceph-mixin/dashboards_out/osd-device-details.json
          token: ""
        ceph-pool-overview:
          url: https://raw.githubusercontent.com/ceph/ceph/v20.2.0/monitoring/ceph-mixin/dashboards_out/pool-overview.json
          token: ""
        ceph-pool-detail:
          url: https://raw.githubusercontent.com/ceph/ceph/v20.2.0/monitoring/ceph-mixin/dashboards_out/pool-detail.json
          token: ""
        ceph-cephfs-overview:
          url: https://raw.githubusercontent.com/ceph/ceph/v20.2.0/monitoring/ceph-mixin/dashboards_out/cephfs-overview.json
          token: ""
        rook-ceph-cluster:
          url: https://raw.githubusercontent.com/rook/rook/v1.20.0/deploy/examples/monitoring/grafana/Ceph%20Cluster%20Dashboard.json
          token: ""
        rook-ceph-osd:
          url: https://raw.githubusercontent.com/rook/rook/v1.20.0/deploy/examples/monitoring/grafana/Ceph%20OSD%20Single%20Dashboard.json
          token: ""
        rook-ceph-pools:
          url: https://raw.githubusercontent.com/rook/rook/v1.20.0/deploy/examples/monitoring/grafana/Ceph%20Pools%20Dashboard.json
          token: ""
  alertmanager:
    config:
      global:
        resolve_timeout: 5m
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 25Gi
  prometheusOperator:
    revisionHistoryLimit: 3
  kube-state-metrics:
    revisionHistoryLimit: 3
  prometheus:
    prometheusSpec:
      retention: 10d
      retentionSize: 20GiB
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 25Gi
      resources:
        requests:
          memory: 2500Mi
          cpu: 200m
        limits:
          memory: 4Gi
          cpu: "1"
      ruleSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      additionalScrapeConfigs:
        - job_name: "asusrouter"
          scrape_interval: 5s
          static_configs:
            - targets: ["192.168.50.1:9101"]
        - job_name: "qnap"
          scrape_interval: 10s
          static_configs:
            - targets: ["192.168.50.8:9094"]
  prometheus-node-exporter:
    # pinned master build 2026-06-23 — includes EINVAL graceful-skip fix (upstream PR #3657)
    # REF: https://github.com/prometheus/node_exporter/issues/3071
    # TODO: switch back to quay.io release once v1.11.2+ ships
    version: "1.11.1"
    image:
      registry: ghcr.io
      repository: prometheus/node-exporter
      tag: master
      distroless: true
      digest: sha256:14369a704fa331517838869e24d5df2f60ef5c7d2091a74ac24c56674c8224dc
    extraArgs:
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
      - --collector.nvme
      # drm: Intel GPU frequency/engine metrics on mc nodes; nv1 has no DRM card, collector is a no-op there
      - --collector.drm
