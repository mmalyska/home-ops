---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smart-disk-health
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: prometheus-stack
spec:
  groups:
    - name: smart.nvme
      interval: 5m
      rules:
        - alert: NVMeTemperatureHigh
          expr: smartctl_device_temperature{device="nvme0n1"} > 70
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'NVMe temperature high on {{`{{ $labels.instance }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.instance }}`}} is at {{`{{ $value }}`}}°C'
        - alert: NVMeTemperatureCritical
          expr: smartctl_device_temperature{device="nvme0n1"} > 80
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: 'NVMe temperature critical on {{`{{ $labels.instance }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.instance }}`}} is at {{`{{ $value }}`}}°C'
        - alert: NVMeWearHigh
          expr: smartctl_device_percentage_used{device="nvme0n1"} > 80
          labels:
            severity: warning
          annotations:
            summary: 'NVMe wear high on {{`{{ $labels.instance }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.instance }}`}} is {{`{{ $value }}`}}% worn'
        - alert: NVMeWearCritical
          expr: smartctl_device_percentage_used{device="nvme0n1"} > 95
          labels:
            severity: critical
          annotations:
            summary: 'NVMe wear critical on {{`{{ $labels.instance }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.instance }}`}} is {{`{{ $value }}`}}% worn'
        - alert: NVMeMediaErrors
          expr: increase(smartctl_device_media_errors{device="nvme0n1"}[1h]) > 0
          labels:
            severity: critical
          annotations:
            summary: 'NVMe media errors detected on {{`{{ $labels.instance }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.instance }}`}} has new media errors'
    - name: smart.sata
      interval: 5m
      rules:
        - alert: SATASmartHealthFailed
          expr: smartctl_device_smart_status{device="sda"} != 1
          labels:
            severity: critical
          annotations:
            summary: 'SATA drive SMART health failed on {{`{{ $labels.instance }}`}}'
            description: 'Device {{`{{ $labels.device }}`}} on {{`{{ $labels.instance }}`}} reports SMART failure'
        - alert: SATATemperatureHigh
          expr: smartctl_device_temperature{device="sda"} > 70
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'SATA drive temperature high on {{`{{ $labels.instance }}`}}'
            description: 'Device {{`{{ $labels.device }}`}} on {{`{{ $labels.instance }}`}} is at {{`{{ $value }}`}}°C'
        - alert: SATAWearHigh
          expr: smartctl_device_percentage_used{device="sda"} > 80
          labels:
            severity: warning
          annotations:
            summary: 'SATA drive wear high on {{`{{ $labels.instance }}`}}'
            description: 'Device {{`{{ $labels.device }}`}} on {{`{{ $labels.instance }}`}} is {{`{{ $value }}`}}% worn'
