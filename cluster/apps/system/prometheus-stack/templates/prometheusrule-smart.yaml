---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smart-disk-health
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: prometheus-stack
spec:
  groups:
    - name: smart.nvme
      interval: 5m
      rules:
        - alert: NVMeTemperatureHigh
          expr: smartctl_device_temperature{device="nvme0n1"} > 70
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'NVMe temperature high on {{`{{ $labels.node }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} is at {{`{{ $value }}`}}°C'
        - alert: NVMeTemperatureCritical
          expr: smartctl_device_temperature{device="nvme0n1"} > 80
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: 'NVMe temperature critical on {{`{{ $labels.node }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} is at {{`{{ $value }}`}}°C'
        - alert: NVMeWearHigh
          expr: smartctl_device_percentage_used{device="nvme0n1"} > 80
          labels:
            severity: warning
          annotations:
            summary: 'NVMe wear high on {{`{{ $labels.node }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} is {{`{{ $value }}`}}% worn'
        - alert: NVMeWearCritical
          expr: smartctl_device_percentage_used{device="nvme0n1"} > 95
          labels:
            severity: critical
          annotations:
            summary: 'NVMe wear critical on {{`{{ $labels.node }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} is {{`{{ $value }}`}}% worn'
        - alert: NVMeMediaErrors
          expr: increase(smartctl_device_media_errors{device="nvme0n1"}[1h]) > 0
          labels:
            severity: critical
          annotations:
            summary: 'NVMe media errors detected on {{`{{ $labels.node }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} has new media errors'
    - name: smart.sata
      interval: 5m
      rules:
        - alert: SATASmartHealthFailed
          expr: smartctl_device_smart_status{device=~"sda|sdb"} != 1
          labels:
            severity: critical
          annotations:
            summary: 'SATA drive SMART health failed on {{`{{ $labels.node }}`}}'
            description: 'Device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} reports SMART failure'
        - alert: SATATemperatureHigh
          expr: smartctl_device_temperature{device=~"sda|sdb"} > 70
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'SATA drive temperature high on {{`{{ $labels.node }}`}}'
            description: 'Device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} is at {{`{{ $value }}`}}°C'
        - alert: SATAWearHigh
          expr: (100 - smartctl_device_attribute{device=~"sda|sdb", attribute_name="Percent_Lifetime_Remain", value_type="raw"}) > 80
          labels:
            severity: warning
          annotations:
            summary: 'SATA drive wear high on {{`{{ $labels.node }}`}}'
            description: 'Device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} is {{`{{ $value }}`}}% worn'
    - name: smart.qnap.nvme
      interval: 5m
      rules:
        - alert: QNAPNVMeWearHigh
          expr: node_nvme_percentage_used_ratio{job="qnap"} * 100 > 80
          labels:
            severity: warning
          annotations:
            summary: 'QNAP NVMe wear high on {{`{{ $labels.node }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} is {{`{{ $value }}`}}% worn'
        - alert: QNAPNVMeWearCritical
          expr: node_nvme_percentage_used_ratio{job="qnap"} * 100 > 95
          labels:
            severity: critical
          annotations:
            summary: 'QNAP NVMe wear critical on {{`{{ $labels.node }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} is {{`{{ $value }}`}}% worn'
        - alert: QNAPNVMeTemperatureHigh
          expr: node_nvme_temperature_celsius{job="qnap"} > 70
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'QNAP NVMe temperature high on {{`{{ $labels.node }}`}}'
            description: 'NVMe device {{`{{ $labels.device }}`}} on {{`{{ $labels.node }}`}} is at {{`{{ $value }}`}}°C'
    - name: smart.qnap.hdd
      interval: 5m
      rules:
        - alert: QNAPHDDSmartFailed
          expr: count by (hd, node) (node_hdtmp_C{job="qnap", smart!="GOOD"}) > 0
          labels:
            severity: critical
          annotations:
            summary: 'QNAP HDD SMART health failed on {{`{{ $labels.node }}`}}'
            description: 'HDD {{`{{ $labels.hd }}`}} on {{`{{ $labels.node }}`}} reports SMART failure'
        - alert: QNAPHDDTemperatureHigh
          expr: node_hdtmp_C{job="qnap"} > 50
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'QNAP HDD temperature high on {{`{{ $labels.node }}`}}'
            description: 'HDD {{`{{ $labels.hd }}`}} on {{`{{ $labels.node }}`}} is at {{`{{ $value }}`}}°C'
