apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: cert-manager

# additional resources like ingress rules, cluster and repository secrets.
resources:
  # renovate-raw: datasource=github-releases depName=cert-manager/cert-manager
  - https://github.com/cert-manager/cert-manager/releases/download/v1.20.2/cert-manager.yaml
  - resources/api-token-externalsecret.yaml
  - resources/lets-encrypt-dns01-cf.yaml

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/revisionHistoryLimit
        value: 3
