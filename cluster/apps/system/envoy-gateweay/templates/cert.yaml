apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-production
spec:
  secretName: cert-production-tls
  issuerRef:
    name: lets-encrypt-dns01-production-cf
    kind: ClusterIssuer
  commonName: '<secret:private-domain>'
  duration: 160h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
  dnsNames:
    - '<secret:private-domain>'
    - '*.<secret:private-domain>'
