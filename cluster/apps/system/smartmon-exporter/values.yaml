prometheus-smartctl-exporter:
  image:
    repository: ghcr.io/home-operations/smartctl-exporter
    tag: "0.14.0@sha256:59fe2aeefcfba34c61d184cf2463195e19da1c8e4f3b04eac4c3c1542b30f27e"

  config:
    devices:
      - /dev/sda
      - /dev/sdb
      - /dev/nvme0n1

  serviceMonitor:
    enabled: true
    interval: 60s
    scrapeTimeout: 30s
    relabelings:
      - sourceLabels: [__meta_kubernetes_pod_node_name]
        targetLabel: node
        action: replace

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: [mc1, mc2, mc3]

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

  extraInstances:
    - config:
        devices:
          - /dev/nvme0n1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [nv1]
      tolerations:
        - key: nv
          operator: Equal
          value: NoSchedule
          effect: NoSchedule
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
