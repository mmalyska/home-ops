prometheus-smartctl-exporter:
  config:
    devices:
      - /dev/sda

  serviceMonitor:
    enabled: true
    interval: 60s
    scrapeTimeout: 30s

  nodeSelector:
    kubernetes.io/hostname: mc1

  extraInstances:
    - config:
        devices:
          - /dev/sda
      nodeSelector:
        kubernetes.io/hostname: mc2
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
    - config:
        devices:
          - /dev/sda
      nodeSelector:
        kubernetes.io/hostname: mc3
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
