apiVersion: v1
kind: Secret
metadata:
  name: doppler-token-auth-api
  annotations:
    checksum/secrets: {{ .Files.Get "secret.sec.yaml" | sha256sum }}
type: Opaque
data:
  dopplerToken: <secret:dopplerToken|base64>
  bitwarden-access-token: test
---
apiVersion: v1
kind: Secret
metadata:
  name: bw-token
  annotations:
    checksum/secrets: {{ .Files.Get "secret.sec.yaml" | sha256sum }}
type: Opaque
data:
  bitwarden-access-token: test
