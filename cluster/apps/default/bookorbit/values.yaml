app-template:
  controllers:
    bookorbit:
      pod:
        securityContext:
          runAsUser: 1001
          runAsGroup: 1001
          fsGroup: 1001
          fsGroupChangePolicy: OnRootMismatch
      initContainers:
        wait-db:
          image:
            repository: busybox
            tag: latest@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - sh
            - -c
            - until nc -z bookorbdb-cnpg-rw 5432; do sleep 2; done
      containers:
        app:
          image:
            repository: ghcr.io/bookorbit/bookorbit
            tag: 1.12.0@sha256:1e16c70ec3bcb2d3fd88327fb5cd49b9b0feed373fc33ef0cd14940f4b96fda1
            pullPolicy: IfNotPresent
          env:
            NODE_ENV: production
            PORT: "3000"
            TZ: CET
            PUID: "1001"
            PGID: "1001"
            APP_URL: "https://bookorbit.<secret:private-domain>"
            POSTGRES_HOST: bookorbdb-cnpg-rw
            POSTGRES_PORT: "5432"
            POSTGRES_DB: app
            NODE_MAX_OLD_SPACE_SIZE: "2048"
            OIDC_ALLOW_LOCAL_ISSUERS: "true"
            POSTGRES_USER:
              valueFrom:
                secretKeyRef:
                  name: bookorbdb-cnpg-app
                  key: username
            POSTGRES_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: bookorbdb-cnpg-app
                  key: password
          envFrom:
            - secretRef:
                name: bookorbit-secrets
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/v1/health
                  port: 3000
                initialDelaySeconds: 30
                periodSeconds: 30
                failureThreshold: 3
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/v1/health
                  port: 3000
                initialDelaySeconds: 20
                periodSeconds: 10
                failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi

  service:
    app:
      ports:
        http:
          port: 3000

  route:
    app:
      kind: HTTPRoute
      annotations:
        external-dns.alpha.kubernetes.io/controller: dns-controller
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
          sectionName: https
      hostnames:
        - bookorbit.<secret:private-domain>
      rules:
        - backendRefs:
            - identifier: app
              port: 3000

  persistence:
    data:
      existingClaim: bookorbit
      advancedMounts:
        bookorbit:
          app:
            - path: /data
    books:
      existingClaim: bookorbit-ebooks-pvc
      advancedMounts:
        bookorbit:
          app:
            - path: /books

volsync:
  pvc:
    capacity: 5Gi
    storageClass: ceph-block
    volumeSnapshotClass: csi-ceph-blockpool
  volsync:
    moverSecurityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
    backup:
      schedule: "0 */6 * * *"
      pruneIntervalDays: 14
      retain:
        hourly: 24
        daily: 7
        weekly: 4
        monthly: 2
    restore:
      bootstrap: false

pgsql-cnpg:
  name: bookorbdb
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-standard-bookworm
  instances: 2
  storage:
    size: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  bootstrap:
    initdb:
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector
  monitoring:
    enablePodMonitor: true
  objectStore:
    destinationPath: "s3://k8s-at-home-backup/cnpg/bookorbit"
    endpointURL: <secret:s3_endpoint>
    s3Credentials:
      accessKeyId:
        name: bookorbit-secrets
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: bookorbit-secrets
        key: S3_ACCESS_SECRET_KEY
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
  retentionPolicy: "10d"
  scheduledBackups:
    - name: bookorbdb-cnpg-backup
      spec:
        immediate: true
        schedule: "5 0 0 * * *"
        backupOwnerReference: self
  # Uncomment to restore from S3 backup (requires at least one successful backup to exist):
  # externalClusters:
  #   - name: bookorbdb-cnpg-backup
  #     plugin:
  #       name: barman-cloud.cloudnative-pg.io
  #       parameters:
  #         barmanObjectName: bookorbdb-objectstore
