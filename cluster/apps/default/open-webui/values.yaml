open-webui:
  ollama:
    enabled: false
  ingress:
    enabled: false
  route:
    enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/controller: dns-controller
    parentRefs:
      - name: envoy-internal
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - chat.<secret:private-domain>
  image:
    repository: ghcr.io/open-webui/open-webui
    tag: "v0.9.1@sha256:03d2b006989f0fe6559391a0c5d4ccac12688d7813d23cb4de86e5cc0ab22978"
    pullPolicy: "IfNotPresent"
  resources:
    requests:
      memory: 1100Mi
      cpu: 300m
    limits:
      memory: 2Gi
      cpu: "1"
  websocket:
    enabled: false
