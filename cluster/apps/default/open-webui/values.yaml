open-webui:
  ollama:
    enabled: false
  ingress:
    enabled: false
  route:
    enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/controller: dns-controller
    parentRefs:
      - name: envoy-internal
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - chat.<secret:private-domain>
  image:
    repository: ghcr.io/open-webui/open-webui
    tag: "v0.9.0@sha256:eb874c0530209dd5ca21a4d0a7cc42e69f2ee85f0e7b90ae94659cd415c27c6d"
    pullPolicy: "IfNotPresent"
  resources:
    requests:
      memory: 1100Mi
      cpu: 300m
    limits:
      memory: 2Gi
      cpu: "1"
  websocket:
    enabled: false
