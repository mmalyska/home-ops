---
volsync:
  moverSecurityContext:
    runAsUser: &runAsUser 1000
    runAsGroup: &runAsGroup 1000
    fsGroup: &fsGroup 1000
  backup:
    schedule: "0 */6 * * *"

app-template:
  controllers:
    n8n:
      pod:
        securityContext:
          runAsUser: *runAsUser
          runAsGroup: *runAsGroup
          fsGroup: *fsGroup
          fsGroupChangePolicy: "OnRootMismatch"
      containers:
        app:
          image:
            repository: ghcr.io/n8n-io/n8n
            tag: 2.17.2@sha256:4e5be628f9eb05e3fde3cd242c84f6000165c95d2048d5076fcc569421ada4f3
          env:
            DB_SQLITE_VACUUM_ON_STARTUP: true
            EXECUTIONS_DATA_PRUNE: true
            EXECUTIONS_DATA_MAX_AGE: 7
            EXECUTIONS_DATA_PRUNE_MAX_COUNT: 50000
            GENERIC_TIMEZONE: "Europe/Warsaw"
            N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: false
            N8N_PROTOCOL: "https"
            N8N_PORT: &port 8080
            N8N_HOST: n8n.<secret:private-domain>
            WEBHOOK_URL: https://n8n-webhook.<secret:private-domain>/
            N8N_LOG_LEVEL: info
            N8N_LOG_OUTPUT: console
            N8N_ENCRYPTION_KEY: <secret:encryption-key>
          resources:
            requests:
              cpu: 5m
              memory: 128Mi
            limits:
              memory: 2Gi

  persistence:
    data:
      existingClaim: n8n
      advancedMounts:
        n8n:
          app:
            - path: /home/node/.n8n

  service:
    app:
      ports:
        http:
          port: *port

  route:
    n8n:
      kind: HTTPRoute
      annotations:
        external-dns.alpha.kubernetes.io/controller: dns-controller
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
          sectionName: https
      hostnames:
        - n8n.<secret:private-domain>
      rules:
        - backendRefs:
            - identifier: app
              port: 8080
    n8n-webhook:
      kind: HTTPRoute
      annotations:
        external-dns.alpha.kubernetes.io/controller: dns-controller
      parentRefs:
        - name: envoy-external
          namespace: envoy-gateway
          sectionName: https
      hostnames:
        - n8n-webhook.<secret:private-domain>
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /webhook
            - path:
                type: PathPrefix
                value: /webhook-test
          backendRefs:
            - identifier: app
              port: 8080
