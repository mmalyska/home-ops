global:
  additionalLabels: {}
  podAnnotations: {}
  podLabels: {}
  image:
    imagePullPolicy: IfNotPresent
name: gitea
gitea:
  strategy:
    type: Recreate
  image:
    registry: docker.gitea.com
    repository: gitea
    tag: 1.26.4
    digest: sha256:8e25c717b8f748445e15ec46e0390f577cb628101184cb0a150d1dae126c1f39
    pullPolicy: IfNotPresent
    rootless: true # only possible when running 1.14 or later
  podSecurityContext:
    fsGroup: 1000
  gitea:
    config:
      APP_NAME: "Gitea: Git with a cup of tea"
      RUN_MODE: "prod"
      RUN_USER: "git"
      server:
        APP_DATA_PATH: "/data"
        DOMAIN: git.<secret:private-domain>
        SSH_DOMAIN: git.<secret:private-domain>
        HTTP_PORT: 3000
        ROOT_URL: https://git.<secret:private-domain>/
        LFS_START_SERVER: true
        SSH_PORT: 22
        SSH_LISTEN_PORT: 8254
        START_SSH_SERVER: false # error on two ssh starting
      database:
        DB_TYPE: postgres
        HOST: giteadb-cnpg-rw
        NAME: app
        SSL_MODE: require
      service:
        DISABLE_REGISTRATION: true
        ENABLE_CAPTCHA: true
        DEFAULT_KEEP_EMAIL_PRIVATE: true
        DEFAULT_ALLOW_CREATE_ORGANIZATION: false
      cors:
        ENABLED: true
        SCHEME: https
        ALLOW_DOMAIN: <secret:private-domain>
        ALLOW_SUBDOMAIN: true
        METHODS: "GET,HEAD,POST,PUT,PATCH,DELETE,OPTIONS"
        MAX_AGE: 10m
        ALLOW_CREDENTIALS: false
      session:
        PROVIDER: redis-cluster
        PROVIDER_CONFIG: redis+cluster://:gitea@gitea-redis-cluster-headless.gitea.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s&
      cache:
        ENABLED: true
        ADAPTER: redis-cluster
        HOST: redis+cluster://:gitea@gitea-redis-cluster-headless.gitea.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s&
      queue:
        TYPE: redis
        CONN_STR: redis+cluster://:gitea@gitea-redis-cluster-headless.gitea.svc.cluster.local:6379/0?pool_size=100&idle_timeout=180s&
  ingress:
    enabled: false
  postgresql:
    enabled: false
  valkey-cluster:
    enabled: false
  valkey:
    enabled: true
  postgresql-ha:
    enabled: false
  persistence:
    enabled: true
    claimName: gitea-data
    accessModes:
      - ReadWriteOnce
    storageClass: ceph-block
  replicaCount: 0
  deployment:
    env:
      - name: GITEA__database__DB_TYPE
        value: postgres
      - name: GITEA__database__USER
        valueFrom:
          secretKeyRef:
            name: giteadb-cnpg-app
            key: username
      - name: GITEA__database__PASSWD
        valueFrom:
          secretKeyRef:
            name: giteadb-cnpg-app
            key: password
pgsql-cnpg:
  name: giteadb
  imageName: ghcr.io/cloudnative-pg/postgresql:15.10-standard-bookworm
  instances: 2
  storage:
    size: 10Gi
  resources:
    requests:
      memory: 200Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enablePodMonitor: true
  retentionPolicy: "10d"
  objectStore:
    destinationPath: "s3://k8s-at-home-backup/cnpg/gitea"
    endpointURL: <secret:s3_endpoint>
    s3Credentials:
      accessKeyId:
        name: gitea-secrets
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: gitea-secrets
        key: S3_ACCESS_SECRET_KEY
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
  scheduledBackups:
    - name: giteadb-cnpg-backup
      spec:
        immediate: true
        schedule: "5 0 0 * * *"
        backupOwnerReference: self
  # Uncomment to restore from S3 backup (requires at least one successful backup to exist):
  # bootstrap:
  #   recovery:
  #     source: giteadb-cnpg-backup
  # externalClusters:
  #   - name: giteadb-cnpg-backup
  #     plugin:
  #       name: barman-cloud.cloudnative-pg.io
  #       parameters:
  #         barmanObjectName: giteadb-objectstore
