pgsql-cnpg:
  name: nextclouddb
  imageName: ghcr.io/cloudnative-pg/postgresql:15.10-standard-bookworm
  instances: 2
  storage:
    size: 10Gi
  resources:
    requests:
      memory: 200Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enablePodMonitor: true
  retentionPolicy: "10d"
  objectStore:
    destinationPath: "s3://k8s-at-home-backup/cnpg/nextcloud"
    endpointURL: <secret:s3_endpoint>
    s3Credentials:
      accessKeyId:
        name: nextcloud-s3-secret
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: nextcloud-s3-secret
        key: S3_ACCESS_SECRET_KEY
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
  scheduledBackups:
    - name: nextclouddb-cnpg-backup
      spec:
        immediate: true
        schedule: "15 0 0 * * *"
        backupOwnerReference: self
