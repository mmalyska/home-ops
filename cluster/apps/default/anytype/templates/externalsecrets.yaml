apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anytype-coordinator-config
  namespace: anytype
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  refreshInterval: 1h
  target:
    name: anytype-coordinator-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.yml: '{{`{{ .COORDINATOR_CONFIG }}`}}'
        network.yml: '{{`{{ .NETWORK_CONFIG }}`}}'
  data:
    - secretKey: COORDINATOR_CONFIG
      remoteRef:
        key: "REPLACE-WITH-UUID" #gitleaks:allow #anytype-coordinator-config
    - secretKey: NETWORK_CONFIG
      remoteRef:
        key: "REPLACE-WITH-UUID" #gitleaks:allow #anytype-network-config
---
