apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anytype-coordinator-config
  namespace: anytype
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  refreshInterval: 1h
  target:
    name: anytype-coordinator-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.yml: '{{`{{ .COORDINATOR_CONFIG }}`}}'
        network.yml: '{{`{{ .NETWORK_CONFIG }}`}}'
  data:
    - secretKey: COORDINATOR_CONFIG
      remoteRef:
        key: "85683096-2902-4a68-ad83-b471016797bf" #gitleaks:allow #anytype-coordinator-config
    - secretKey: NETWORK_CONFIG
      remoteRef:
        key: "9a83d575-b6a1-4c25-9716-b4710167c319" #gitleaks:allow #anytype-network-config
---
