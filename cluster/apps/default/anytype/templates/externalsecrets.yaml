apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anytype-aws-credentials
  namespace: anytype
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  refreshInterval: 1h
  target:
    name: anytype-aws-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        credentials: |
          [default]
          aws_access_key_id={{`{{ .AWS_ACCESS_KEY_ID }}`}}
          aws_secret_access_key={{`{{ .AWS_SECRET_ACCESS_KEY }}`}}
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: "REPLACE-WITH-UUID" #gitleaks:allow #anytype-aws-access-key-id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: "REPLACE-WITH-UUID" #gitleaks:allow #anytype-aws-secret-access-key
