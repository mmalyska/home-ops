hermes:
  image:
    repository: nousresearch/hermes-agent
    tag: "main@sha256:3555b9eb722bca03b81815a1b309602a345604e5cfcf2c5f42e2b496fd115722"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
  config:
    model:
      provider: "anthropic"
      default: "claude-sonnet-4-6"
    display:
      show_cost: true

signalCli:
