hermes:
  image:
    repository: nousresearch/hermes-agent
    tag: "main@sha256:31e731dc1e20b8dcd39ba280451a400978e33f80d508aa5c6d1af09200c8f9b8"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
  config:
    model:
      provider: openrouter
      default: "deepseek/deepseek-v4-pro"
    approvals:
      mode: smart
    display:
      show_cost: true
    dashboard:
      show_token_analytics: true
    timezone: "Europe/Warsaw"
    discord:
      require_mention: true
      free_response_channels: "881886312574107758"
      auto_thread: true
    provider_routing:
      sort: "price"
      data_collection: "deny"
    fallback_providers:
      - provider: anthropic
        model: claude-sonnet-4-6
    auxiliary:
      vision:
        provider: openrouter
        model: "google/gemini-2.5-flash-lite"
      web_extract:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      compression:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      skills_hub:
        provider: auto
        model: ""
      approval:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      mcp:
        provider: auto
        model: ""
      title_generation:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      triage_specifier:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      kanban_decomposer:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      profile_describer:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      curator:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
