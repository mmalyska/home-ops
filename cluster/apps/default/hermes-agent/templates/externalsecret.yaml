apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-agent-secrets
  namespace: hermes-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  refreshInterval: 1h
  target:
    name: hermes-agent-secrets
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_TOKEN
      remoteRef:
        key: "2c6efb7e-d4e6-4dc5-ada9-b45600b5ce8e" #gitleaks:allow #ANTHROPIC_TOKEN
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: "790817a9-4048-4bcb-b23a-b4560090065b" #gitleaks:allow #HERMES_OPENROUTER_API_KEY
    - secretKey: SIGNAL_ACCOUNT
      remoteRef:
        key: "158c3d58-550d-4d5b-abff-b456008e27e2" #gitleaks:allow #HERMES_SIGNAL_ACCOUNT
    - secretKey: SIGNAL_ALLOWED_USERS
      remoteRef:
        key: "719fd085-f387-4332-a675-b456008e757a" #gitleaks:allow #HERMES_SIGNAL_ALLOWED_USERS
    - secretKey: SIGNAL_HOME_CHANNEL
      remoteRef:
        key: "398a8c7d-403f-4f06-b441-b45600aa8c7f" #gitleaks:allow #HERMES_SIGNAL_HOME_CHANNEL
