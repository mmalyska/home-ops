apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
      annotations:
        checksum/config:
          {{include (print $.Template.BasePath "/configmap.yaml") . | sha256sum}}
    spec:
      initContainers:
        - name: config-seeder
          image: "{{ .Values.hermes.image.repository }}:{{ .Values.hermes.image.tag }}"
          command:
            - python3
            - -c
            - |
              import yaml, json, os

              template_path = '/config-template/config.yaml'
              config_path = '/opt/data/config.yaml'

              with open(template_path) as f:
                  overrides = yaml.safe_load(f)

              if os.path.exists(config_path):
                  with open(config_path) as f:
                      config = yaml.safe_load(f) or {}

                  def deep_merge(base, src):
                      for k, v in src.items():
                          if isinstance(v, dict) and isinstance(base.get(k), dict):
                              deep_merge(base[k], v)
                          else:
                              base[k] = v

                  deep_merge(config, overrides)
              else:
                  config = overrides

              with open(config_path, 'w') as f:
                  yaml.dump(config, f, default_flow_style=False, allow_unicode=True, sort_keys=False)

              with open('/opt/data/gateway_state.json', 'w') as f:
                  json.dump({'gateway_state': 'running'}, f)
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config-template
              mountPath: /config-template
      containers:
        - name: hermes-agent
          image: "{{ .Values.hermes.image.repository }}:{{ .Values.hermes.image.tag }}"
          args:
            - gateway
            - run
          env:
            - name: HOME
              value: /opt/data
            - name: HERMES_DASHBOARD
              value: "true"
            - name: OLLAMA_BASE_URL
              value: "http://ollama.ha-ollama.svc.cluster.local:11434/v1"
            - name: SIGNAL_HTTP_URL
              value: "http://signal-cli:8080"
            - name: ANTHROPIC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-secrets
                  key: ANTHROPIC_TOKEN
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-secrets
                  key: OPENROUTER_API_KEY
            - name: SIGNAL_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-secrets
                  key: SIGNAL_ACCOUNT
            - name: SIGNAL_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-secrets
                  key: SIGNAL_ALLOWED_USERS
            - name: SIGNAL_HOME_CHANNEL
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-secrets
                  key: SIGNAL_HOME_CHANNEL
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-secrets
                  key: DISCORD_BOT_TOKEN
            - name: DISCORD_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-agent-secrets
                  key: DISCORD_ALLOWED_USERS
          ports:
            - name: http
              containerPort: 9119
              protocol: TCP
          resources: {{toYaml .Values.hermes.resources | nindent 12}}
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: config-template
          configMap:
            name: hermes-agent-config
