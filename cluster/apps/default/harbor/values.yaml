harbor:
  core:
    extraEnvVars:
      - name: CONFIG_OVERWRITE_JSON
        valueFrom:
          secretKeyRef:
            name: harbor-oidc-secret
            key: CONFIG_OVERWRITE_JSON

  expose:
    type: clusterIP
    tls:
      enabled: false
  externalURL: https://harbor.<secret:private-domain>

  # Admin password from cluster-secrets (substituted before Helm renders)
  harborAdminPassword: <secret:harbor-admin-password>

  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        storageClass: ceph-block
        size: 200Gi
      jobservice:
        jobLog:
          storageClass: ceph-block
          size: 5Gi
      database:
        storageClass: ceph-block
        size: 2Gi
      redis:
        storageClass: ceph-block
        size: 2Gi
      trivy:
        storageClass: ceph-block
        size: 5Gi

  database:
    type: external
    external:
      host: harbordb-cnpg-rw
      port: "5432"
      username: app
      coreDatabase: app
      existingSecret: harbordb-cnpg-app
      sslmode: require

  redis:
    type: internal

  trivy:
    enabled: false

  notary:
    server:
      enabled: false
    signer:
      enabled: false

pgsql-cnpg:
  name: harbordb
  instances: 2
  storage:
    size: 5Gi
  monitoring:
    enablePodMonitor: true
  retentionPolicy: "10d"
  objectStore:
    destinationPath: "s3://k8s-at-home-backup/cnpg/harbor"
    endpointURL: <secret:s3_endpoint>
    s3Credentials:
      accessKeyId:
        name: harbor-s3-secret
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: harbor-s3-secret
        key: S3_ACCESS_SECRET_KEY
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
  scheduledBackups:
    - name: harbordb-cnpg-backup
      spec:
        immediate: true
        schedule: "5 0 0 * * *"
        backupOwnerReference: self
