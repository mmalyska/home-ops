---
# Coder server secrets: OIDC client secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-secrets
  namespace: coder
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  refreshInterval: 1h
  target:
    name: coder-secrets
    creationPolicy: Owner
  data:
    - secretKey: oidc-client-secret
      remoteRef:
        key: "39b68408-f1d5-43d0-96f1-b46201471f53" #gitleaks:allow #CODER_OIDC_CLIENT_SECRET
---
# CNPG barman-cloud S3 backup credentials (reuse cluster S3 keys)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-cnpg-s3-secret
  namespace: coder
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  refreshInterval: 1h
  target:
    name: coder-cnpg-s3-secret
    creationPolicy: Owner
  data:
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: "e00e1e38-ae37-479a-8b46-b409016331eb" #gitleaks:allow #S3_ACCESS_KEY
    - secretKey: S3_ACCESS_SECRET_KEY
      remoteRef:
        key: "4d5a418c-82ed-4b8e-bfbf-b40901634ea4" #gitleaks:allow #S3_SECRET_KEY
