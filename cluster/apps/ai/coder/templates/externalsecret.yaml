---
# Coder server secrets: OIDC client secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-secrets
  namespace: coder
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  refreshInterval: 1h
  target:
    name: coder-secrets
    creationPolicy: Owner
  data:
    - secretKey: oidc-client-secret
      remoteRef:
        key: "REPLACE_WITH_BWS_ID" #gitleaks:allow #CODER_OIDC_CLIENT_SECRET
---
# CNPG barman-cloud S3 backup credentials (reuse cluster S3 keys)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-cnpg-s3-secret
  namespace: coder
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  refreshInterval: 1h
  target:
    name: coder-cnpg-s3-secret
    creationPolicy: Owner
  data:
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: "e00e1e38-ae37-479a-8b46-b409016331eb" #gitleaks:allow #S3_ACCESS_KEY
    - secretKey: S3_ACCESS_SECRET_KEY
      remoteRef:
        key: "4d5a418c-82ed-4b8e-bfbf-b40901634ea4" #gitleaks:allow #S3_SECRET_KEY
---
# Harbor robot account for workspace pod image pulls
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coder-harbor-pull-secret
  namespace: coder
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  refreshInterval: 1h
  target:
    name: coder-harbor-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.<secret:private-domain>":{"username":"robot$sandbox","password":"{{ .harbor_robot_password }}","auth":"{{ printf "robot$sandbox:%s" .harbor_robot_password | b64enc }}"}}}
  data:
    - secretKey: harbor_robot_password
      remoteRef:
        key: "REPLACE_WITH_BWS_ID" #gitleaks:allow #HARBOR_SANDBOX_ROBOT_PASSWORD
