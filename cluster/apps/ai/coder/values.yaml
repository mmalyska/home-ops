---
coder: {}

pgsql-cnpg:
  name: coderdb
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-standard-bookworm
  instances: 2
  storage:
    size: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enablePodMonitor: true
  retentionPolicy: "10d"
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
  objectStore:
    destinationPath: "s3://k8s-at-home-backup/cnpg/coder"
    endpointURL: <secret:s3_endpoint>
    s3Credentials:
      accessKeyId:
        name: coder-cnpg-s3-secret
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: coder-cnpg-s3-secret
        key: S3_ACCESS_SECRET_KEY
  scheduledBackups:
    - name: coderdb-backup
      spec:
        schedule: "0 2 * * *"
        backupOwnerReference: self
        immediate: true
