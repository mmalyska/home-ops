---
coder:
  coder:
    service:
      type: ClusterIP
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    env:
      # Database — built from CNPG-managed secret using K8s env var substitution
      - name: PGUSER
        valueFrom:
          secretKeyRef:
            name: coderdb-cnpg-app
            key: username
      - name: PGPASSWORD
        valueFrom:
          secretKeyRef:
            name: coderdb-cnpg-app
            key: password
      - name: CODER_PG_CONNECTION_URL
        value: "postgres://$(PGUSER):$(PGPASSWORD)@coderdb-cnpg-rw/app?sslmode=require"
      # Access URL (uses cluster-secrets plugin substitution)
      - name: CODER_ACCESS_URL
        value: "https://coder.<secret:private-domain>"
      # Keycloak OIDC
      - name: CODER_OIDC_ISSUER_URL
        value: "https://l.<secret:private-domain>/realms/home"
      - name: CODER_OIDC_CLIENT_ID
        value: "coder"
      - name: CODER_OIDC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: coder-secrets
            key: oidc-client-secret
      - name: CODER_OIDC_EMAIL_DOMAIN
        value: "gmail.com"
      - name: CODER_OIDC_ALLOW_SIGNUPS
        value: "true"

pgsql-cnpg:
  name: coderdb
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-standard-bookworm
  instances: 2
  storage:
    size: 5Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enablePodMonitor: true
  retentionPolicy: "10d"
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
  objectStore:
    destinationPath: "s3://k8s-at-home-backup/cnpg/coder"
    endpointURL: <secret:s3_endpoint>
    s3Credentials:
      accessKeyId:
        name: coder-cnpg-s3-secret
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: coder-cnpg-s3-secret
        key: S3_ACCESS_SECRET_KEY
  scheduledBackups:
    - name: coderdb-backup
      spec:
        schedule: "0 2 * * *"
        backupOwnerReference: self
        immediate: true
