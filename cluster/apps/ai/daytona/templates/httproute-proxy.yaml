apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: daytona-proxy
  annotations:
    external-dns.alpha.kubernetes.io/controller: dns-controller
spec:
  parentRefs:
    - name: envoy-internal
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - "*.daytona.<secret:private-domain>"
  rules:
    - backendRefs:
        - name: daytona-proxy
          port: 4000
