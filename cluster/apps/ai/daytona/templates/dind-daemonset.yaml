apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daytona-dind
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona-dind
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona-dind
    spec:
      nodeSelector:
        daytona-sandbox-c: "true"
      tolerations:
        - key: "sandbox"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            # Disable TLS — runner connects via localhost TCP, no external exposure
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - "--host=tcp://0.0.0.0:2375"
            - "--host=unix:///var/run/docker.sock"
          ports:
            - containerPort: 2375
              protocol: TCP
              name: docker-tcp
          volumeMounts:
            - name: docker-data
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 4Gi
          readinessProbe:
            exec:
              command: ["docker", "info"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: docker-data
          emptyDir:
            sizeLimit: 50Gi
