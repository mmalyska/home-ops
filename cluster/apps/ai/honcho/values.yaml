honcho:
  image:
    repository: ghcr.io/plastic-labs/honcho
    tag: "v3.0.7"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  deriver:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

openrouterBwsId: "7ece641d-8f3e-42f6-b306-b45900a618ad" #gitleaks:allow #HONCHO_OPENROUTER_API_KEY

pgsql-cnpg:
  name: honchodb
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-standard-bookworm
  instances: 2
  storage:
    size: 30Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  bootstrap:
    recovery:
      source: honchodb-cnpg-backup
  externalClusters:
    - name: honchodb-cnpg-backup
      barmanObjectStore:
        serverName: honchodb
        destinationPath: "s3://k8s-at-home-backup/cnpg/honcho"
        endpointURL: <secret:s3_endpoint>
        s3Credentials:
          accessKeyId:
            name: honcho-secrets
            key: S3_ACCESS_KEY_ID
          secretAccessKey:
            name: honcho-secrets
            key: S3_ACCESS_SECRET_KEY
  monitoring:
    enablePodMonitor: true
  backup:
    retentionPolicy: "10d"
    barmanObjectStore:
      destinationPath: "s3://k8s-at-home-backup/cnpg/honcho"
      endpointURL: <secret:s3_endpoint>
      s3Credentials:
        accessKeyId:
          name: honcho-secrets
          key: S3_ACCESS_KEY_ID
        secretAccessKey:
          name: honcho-secrets
          key: S3_ACCESS_SECRET_KEY
  scheduledBackups:
    - name: honchodb-cnpg-backup
      spec:
        immediate: true
        schedule: "10 0 0 * * *"
        backupOwnerReference: self
