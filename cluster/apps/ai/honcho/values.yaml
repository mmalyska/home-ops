honcho:
  image:
    repository: ghcr.io/plastic-labs/honcho
    tag: "v3.0.11@sha256:383edb2bd63af7c78cdc875a058d98ab5757cef4bc3f7a8b102148e2db89b3c6"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  deriver:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

openrouterBwsId: "7ece641d-8f3e-42f6-b306-b45900a618ad" #gitleaks:allow #HONCHO_OPENROUTER_API_KEY

pgsql-cnpg:
  name: honchodb
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-standard-bookworm
  instances: 2
  storage:
    size: 30Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  bootstrap:
    initdb:
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector
  # Uncomment to restore from S3 backup (requires at least one successful backup to exist):
  # bootstrap:
  #   recovery:
  #     source: honchodb-cnpg-backup
  externalClusters:
    - name: honchodb-cnpg-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: honchodb-objectstore
  monitoring:
    enablePodMonitor: true
  retentionPolicy: "10d"
  objectStore:
    destinationPath: "s3://k8s-at-home-backup/cnpg/honcho"
    endpointURL: <secret:s3_endpoint>
    s3Credentials:
      accessKeyId:
        name: honcho-secrets
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: honcho-secrets
        key: S3_ACCESS_SECRET_KEY
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
  scheduledBackups:
    - name: honchodb-cnpg-backup
      spec:
        immediate: true
        schedule: "10 0 0 * * *"
        backupOwnerReference: self
