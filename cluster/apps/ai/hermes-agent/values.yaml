hermes:
  replicas: 1
  image:
    repository: nousresearch/hermes-agent
    tag: "main@sha256:2a1b06477c51fb0c255c8492734ac89ab9aa2b96af27bb50607ddaba01335c0e"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 1Gi
  config:
    model:
      provider: openrouter
      default: "deepseek/deepseek-v4-pro"
    approvals:
      mode: smart
    display:
      show_cost: true
    dashboard:
      show_token_analytics: true
    memory:
      provider: honcho
    timezone: "Europe/Warsaw"
    discord:
      require_mention: true
      free_response_channels: "881886312574107758"
      auto_thread: true
    provider_routing:
      sort: "price"
      data_collection: "deny"
    fallback_providers:
      - provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      - provider: anthropic
        model: claude-sonnet-4-6
    auxiliary:
      vision:
        provider: openrouter
        model: "google/gemini-2.5-flash-lite"
      web_extract:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      compression:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      skills_hub:
        provider: auto
        model: ""
      approval:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      mcp:
        provider: auto
        model: ""
      title_generation:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      triage_specifier:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      kanban_decomposer:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      profile_describer:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
      curator:
        provider: openrouter
        model: "deepseek/deepseek-v4-flash"
#    mcp_servers:
